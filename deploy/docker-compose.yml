services:
  backend:
    build:
      context: ../apps/backend
    env_file:
      - ../.env.example
      - path: ../.env
        required: false
    ports:
      - "${OLSP_BACKEND_HOST_PORT:-52891}:8000"
    depends_on:
      - postgres
      - qdrant
      - redis
      - minio
      - llama-ocr
      - llama-embedding

  worker:
    build:
      context: ../apps/backend
    command: ["python", "-m", "app.worker"]
    restart: unless-stopped
    env_file:
      - ../.env.example
      - path: ../.env
        required: false
    depends_on:
      - postgres
      - qdrant
      - redis
      - minio
      - llama-ocr
      - llama-embedding

  frontend:
    build:
      context: ../apps/frontend
    ports:
      - "${OLSP_FRONTEND_HOST_PORT:-18473}:3000"
    environment:
      VITE_BACKEND_HOST_PORT: ${VITE_BACKEND_HOST_PORT:-52891}
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: locascan
      POSTGRES_USER: locascan
      POSTGRES_PASSWORD: locascan
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${OLSP_QDRANT_HOST_PORT:-36144}:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "${OLSP_MINIO_API_HOST_PORT:-49280}:9000"
      - "${OLSP_MINIO_CONSOLE_HOST_PORT:-49281}:9001"
    volumes:
      - minio_data:/data

  llama-ocr:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    gpus:
      - driver: nvidia
        count: all
        capabilities:
          - gpu
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--n-gpu-layers"
      - "999"
      - "--model"
      - "/models/GLM-OCR-Q8_0.gguf"
      - "--mmproj"
      - "/models/mmproj-GLM-OCR-Q8_0.gguf"
      - "--flash-attn"
      - "on"
      - "--ctx-size"
      - "4096"
      
    volumes:
      - ../model:/models:ro

  llama-embedding:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    gpus:
      - driver: nvidia
        count: all
        capabilities:
          - gpu
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--n-gpu-layers"
      - "999"
      - "--embedding"
      - "--pooling"
      - "last"
      - "--model"
      - "/models/Qwen3-Embedding-0.6B-Q8_0.gguf"
      - "--ctx-size"
      - "4096"
    volumes:
      - ../model:/models:ro

volumes:
  postgres_data:
  qdrant_data:
  minio_data:

